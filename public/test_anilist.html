<!DOCTYPE html>
<html>
<head><title>AniList Browser Test</title></head>
<body style="background:#111;color:#0f0;font-family:monospace;padding:20px">
<h2>AniList GraphQL Browser Fetch Test</h2>
<pre id="output">Running test...</pre>
<script>
const output = document.getElementById('output');
function log(msg) { output.textContent += '\n' + msg; }

async function test() {
  log('Testing AniList GraphQL from browser...');
  try {
    const r = await fetch('https://graphql.anilist.co', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        query: `query { Page(page:1, perPage:3) { media(search:"Naruto", type:ANIME) { id title { english romaji } } } }`
      })
    });
    log('Status: ' + r.status + ' ' + r.statusText);
    const json = await r.json();
    log('Result: ' + JSON.stringify(json, null, 2));
    if (json.data && json.data.Page && json.data.Page.media) {
      log('SUCCESS: Found ' + json.data.Page.media.length + ' results');
    } else if (json.errors) {
      log('GRAPHQL ERROR: ' + JSON.stringify(json.errors));
    }
  } catch(e) {
    log('FETCH FAILED: ' + e.message);
    log('Stack: ' + e.stack);
  }
}
test();
</script>
</body>
</html>
